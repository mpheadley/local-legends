<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OG Image Preview — Local Legends 1200x630</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700&family=Rock+Salt&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Source Sans 3', sans-serif;
    }

    .instructions {
      color: #ccc;
      font-size: 14px;
      margin-bottom: 16px;
      text-align: center;
    }
    .instructions strong { color: #CA8A04; }

    /* ─── The OG canvas ─── */
    .og {
      width: 1200px;
      height: 630px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(to right, #3D6B4F, #CA8A04);
    }

    /* Topo texture overlay — primary visual element */
    .og-topo {
      position: absolute;
      inset: 0;
      background-image: url("public/topo-7.png");
      background-size: 600px;
      background-repeat: repeat;
      opacity: 0.5;
      mix-blend-mode: multiply;
      z-index: 1;
      pointer-events: none;
    }

    /* Content */
    .og-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 60px 80px;
    }

    .og-headline {
      font-family: 'Fraunces', serif;
      font-size: 120px;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.05;
      letter-spacing: -1px;
    }

    .og-divider {
      width: 100px;
      height: 4px;
      background: #FFFFFF;
      margin: 28px auto;
      border-radius: 2px;
    }

    .og-sub {
      font-family: 'Rock Salt', cursive;
      font-size: 38px;
      color: #292524;
      letter-spacing: 1px;
    }

    /* Accent bar at bottom */
    .og-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 14px;
      background: #292524;
      z-index: 3;
    }

    /* Subtle grain overlay */
    .og::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 4;
    }
  </style>
</head>
<body>
  <p class="instructions">
    Preview at actual size (1200 x 630). Take a screenshot of the card below.<br>
    On Mac: <strong>Cmd + Shift + 4</strong>, then drag to select just the card.
  </p>

  <div class="og">
    <div class="og-topo"></div>

    <div class="og-content">
      <h1 class="og-headline">Local Legends</h1>
      <div class="og-divider"></div>
      <p class="og-sub">Stories from Northeast Alabama</p>
    </div>

    <!-- Accent bar -->
    <div class="og-bar"></div>
  </div>
</body>
</html>
